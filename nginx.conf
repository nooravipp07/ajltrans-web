server { 
    listen 80; 
    server_name ajltrans.com www.ajltrans.com; 
    return 301 https://$server_name$request_uri; 
} 
  
 server { 
    listen 443 ssl http2; 
    server_name ajltrans.com www.ajltrans.com; 
    root /var/www/ajl-trans/public; 
    index index.php; 
  
    ssl_certificate     /etc/letsencrypt/live/ajltrans.com/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/ajltrans.com/privkey.pem; 
  
    client_max_body_size 50M; # untuk upload video 
  
    location / { 
        try_files $uri $uri/ /index.php?$query_string; 
    } 
  
    location ~ \.php$ { 
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock; 
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name; 
        include fastcgi_params; 
    } 
  
    location ~* \.(js|css|png|jpg|svg|woff2)$ { 
        expires 1y; 
        add_header Cache-Control "public, immutable"; 
    } 
}
